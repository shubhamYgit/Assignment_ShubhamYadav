spring.application.name=Assignment

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/assignment}
spring.datasource.username=assignment
spring.datasource.password=assignment
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

assignment.notifications.sweep-rate-ms=${ASSIGNMENT_NOTIFICATIONS_SWEEP_RATE_MS:300000}
assignment.notifications.initial-delay-ms=${ASSIGNMENT_NOTIFICATIONS_INITIAL_DELAY_MS:300000}
